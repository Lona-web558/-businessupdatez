<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business News Hub — South African Business & Finance News</title>
<meta name="description" content="Business News Hub — daily South African business, markets and economy news.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Live ticker -->
<div class="ticker-bar mono">
  <div class="ticker-track" id="tickerTrack">
    <span class="item">JSE ALSI <span class="val" id="tick-jse">…</span></span>
    <span class="item">USD/ZAR <span class="val" id="tick-usdzar">…</span></span>
    <span class="item">REPO RATE <span class="val" id="tick-repo">…</span></span>
    <span class="item">CPI (YoY) <span class="val" id="tick-cpi">…</span></span>
    <span class="item">BRENT CRUDE <span class="val" id="tick-brent">…</span></span>
    <span class="item text-muted" id="tick-updated">Business News Hub — updated daily by our desk</span>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/">BUSINESS NEWS HUB</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin.html">Admin</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container px-4 py-4">

  <!-- Lead story -->
  <div id="leadStory" class="lead-story mb-5">
    <p class="category-tag mono mb-2">Loading…</p>
    <h2>Fetching today's lead story…</h2>
  </div>

  <!-- Category filters -->
  <div class="category-pills mb-4" id="categoryPills">
    <button class="btn active" data-category="All">All</button>
  </div>

  <!-- Article grid -->
  <div class="row g-4" id="articleGrid">
    <!-- populated by JS -->
  </div>

</div>

<footer class="footer-custom text-center">
  <div class="container">
    &copy; 2026 BUSINESS NEWS HUB — NEWS CONTENT IS FOR INFORMATIONAL PURPOSES ONLY, NOT FINANCIAL ADVICE.
  </div>
</footer>
<script src="sw(2).js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
